name: DevSecOps CI Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  security-scan:
    name: Security Analysis
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the repository
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # TruffleHog needs full history to scan commits properly

      # Step 2: Run TruffleHog Secret Scanner
      - name: TruffleHog Secret Scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified # Only alert on verified credentials to minimize noise

      # Step 3: Run Semgrep SAST (PHP, JS, and HTML/CSS logic)
      - name: Semgrep SAST Scan
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/php
            p/javascript
            p/owasp-top-10
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }} # Optional: Use if connecting to Semgrep App